# Глобальная защита от известных сканеров — подключается в http{} через
# /etc/nginx/conf.d/10-bot-protection.conf (conf.d/* уже включён в http{} по
# умолчанию). Определяет переменную $bad_bot_ua = 1 если User-Agent матчит
# известный вредоносный паттерн. Решение о блоке принимается в snippet'е
# bot-protect.conf, который включается в каждый server{} проксируемых доменов.
#
# ОСТОРОЖНО:
#  - НЕ блокируем python-requests/curl/wget/Go-http-client — это legit CLI.
#  - НЕ блокируем пустой User-Agent (много реальных скриптов его не шлют).
#  - НЕ блокируем certbot — его UA содержит "Let's Encrypt", пропускается.
#  - Регистронезависимо (~*).

map $http_user_agent $bad_bot_ua {
    default 0;

    # Aggressive exploit/pentest tools — точно вредоносные
    ~*(sqlmap|nikto|nessus|openvas|gvm-scanner|greenbone)                       1;
    ~*(acunetix|netsparker|appscan|w3af|arachni|wfuzz|wpscan|joomscan)           1;
    ~*(dirbuster|gobuster|dirsearch|feroxbuster|ffuf)                            1;
    ~*(hydra|medusa|ncrack|patator)                                              1;

    # Mass scanners — массовый интернет-фон, не реальные юзеры
    ~*(masscan|zgrab|nmap|zmap|rustscan)                                         1;

    # Recon/OSINT сервисы — сканируют весь интернет, нам от них пользы нет
    ~*(censys|shodan|binaryedge|netsystemsresearch|onyphe|leakix|stretchoid)     1;
    ~*(zoomeye|driftnet|paloalto|expanse|internet-measurement|researchscan)      1;

    # Шумные IoT-ботнеты и спам-краулеры, которых видно в access.log
    ~*(xmlrpc\.attack|semrush|ahrefsbot|mj12bot|dotbot|petalbot)                 1;
    ~*(webprosbot|seekport|barkrowler|dataforseobot|bytespider)                  1;
}
