# Nginx sites-available фрагмент для DomainController панели.
# Поставить симлинком в /etc/nginx/sites-enabled/domain-panel.conf
#
#   sudo cp deploy/domain-panel.conf /etc/nginx/sites-available/domain-panel.conf
#   sudo ln -sf /etc/nginx/sites-available/domain-panel.conf \
#               /etc/nginx/sites-enabled/domain-panel.conf
#
# Панель проксируется на gunicorn (127.0.0.1:5000). Доступ ограничен allow-list'ом —
# обязательно отредактируйте `allow` под свою сеть перед reload'ом.

# Rate-limit зоны.
#   panel_login — анти-брутфорс на /login (поверх in-memory лимита в приложении).
#   panel_general — общий лимит на всю панель для защиты от DoS/парсеров.
# Зоны определяем вне server{}, на верхнем уровне http{} — поэтому include-файл
# должен подключаться из http{} (стандартно sites-enabled как раз там).
limit_req_zone $binary_remote_addr zone=panel_login:5m rate=5r/m;
limit_req_zone $binary_remote_addr zone=panel_general:10m rate=30r/s;

server {
    listen 8080;
    server_name _;

    # Whitelist: внутренняя сеть + явные внешние IP админов.
    # Всё остальное — 403.
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    # allow 1.2.3.4;   # <-- добавить сюда внешние IP администраторов
    deny all;

    # Анти-Slowloris: отваливаем медленные соединения быстро.
    client_header_timeout  10s;
    client_body_timeout    10s;
    send_timeout           10s;
    keepalive_timeout      30s;

    # Ограничение размера запроса (формы маленькие, загрузок не делаем).
    client_max_body_size   1m;
    client_body_buffer_size 16k;

    # Security headers — применяются ко всем ответам панели.
    add_header X-Frame-Options          "DENY"           always;
    add_header X-Content-Type-Options   "nosniff"        always;
    add_header Referrer-Policy          "no-referrer"    always;
    add_header X-XSS-Protection         "1; mode=block"  always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

    # Скрываем версию nginx в Server-заголовке (server_tokens off;
    # лучше выставить глобально в /etc/nginx/nginx.conf, но оставляем подсказку).

    # /login — жёсткий лимит: 5 попыток в минуту на IP + burst до 3.
    location = /login {
        limit_req zone=panel_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # Healthcheck — открыт всем для мониторинга, без rate-limit.
    location = /healthz {
        allow all;
        proxy_pass http://127.0.0.1:5000/healthz;
        access_log off;
        proxy_read_timeout 5s;
    }

    location / {
        limit_req zone=panel_general burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Внутренний certbot/apply_all_configs могут идти до ~3 мин.
        proxy_connect_timeout 5s;
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
    }
}
