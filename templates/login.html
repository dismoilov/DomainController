{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <i class="bi bi-globe2 text-primary" style="font-size: 3rem;"></i>
            <h1 class="h4 mt-2">Domain Controller</h1>
            <p class="text-muted small">Панель управления доменами и reverse-proxy</p>
        </div>
        <form method="post" class="card p-4">
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person"></i> Логин</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-lock"></i> Пароль</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
